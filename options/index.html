
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>URL Interceptor — Admin</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div class="titles">
          <h1>URL Interceptor</h1>
          <span>Rules • Redirects • Logs</span>
        </div>
      </div>
      <div class="actions">
        <label class="switch">
          <input type="checkbox" id="globalToggle">
          <span class="slider"></span>
        </label>
        <span class="toggle-label">Global</span>
        <button id="btnExport" class="btn outlined">Export</button>
        <label class="btn outlined file-label">
          Import <input type="file" id="fileImport" accept="application/json">
        </label>
        <button id="btnLogs" class="btn">Logs</button>
      </div>
    </header>

    <main class="container">
      <section class="controls card">
        <div class="row">
          <button id="btnNew" class="btn">+ New Rule</button>
        </div>
      </section>

      <section class="rules card">
        <h2>Rules</h2>
        <div id="rulesList" class="list"></div>
      </section>
    </main>

    <!-- Rule Modal -->
    <dialog id="ruleModal" class="modal">
      <form method="dialog" id="ruleForm">
        <h3 id="ruleModalTitle">New Rule</h3>

        <label class="field">
          <span>Name (≤80)</span>
          <input type="text" id="name" maxlength="80" required>
        </label>

        <label class="field">
          <span>Mode</span>
          <select id="mode">
            <option value="exact">Exact match</option>
            <option value="wildcard">Wildcard (*)</option>
            <option value="contain">Contain</option>
          </select>
        </label>

        <label class="field">
          <span>Source URL / Pattern</span>
          <input type="text" id="source" required placeholder="e.g., https://example.com/*/a">
        </label>

        <label class="field">
          <span>Destination URL</span>
          <input type="text" id="destination" required placeholder="e.g., https://target.com/b">
        </label>

        <div class="hint small">
          • In Wildcard mode use * to match any characters.<br/>
          • Contain mode uses substring matching.<br/>
          • Exact mode matches the whole URL.
        </div>

        <div class="modal-actions">
          <button value="cancel" class="btn text">Cancel</button>
          <button id="btnSaveRule" class="btn">Save</button>
        </div>
        <input type="hidden" id="ruleId">
      </form>
    </dialog>

    <!-- Confirm Modal -->
    <dialog id="confirmModal" class="modal">
      <div class="confirm-content">
        <p id="confirmText">Are you sure?</p>
        <div class="modal-actions">
          <button id="btnNo" class="btn text">No</button>
          <button id="btnYes" class="btn danger">Yes</button>
        </div>
      </div>
    </dialog>

    <!-- Logs Modal -->
    <dialog id="logsModal" class="modal modal-lg">
      <div class="logs-header">
        <h3>Logs</h3>
        <div class="spacer"></div>
        <button id="btnClearLogs" class="btn outlined">Clear</button>
        <button id="btnCloseLogs" class="btn text">Close</button>
      </div>
      <div id="logsBody" class="logs"></div>
    </dialog>

    <script src="options.js"></script>
  </body>
</html>
